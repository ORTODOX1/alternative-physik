name: "Python CI"

on:
  push:
    branches: [main, develop]
    paths:
      - 'python/**'
      - 'lenr_constants.py'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python/**'
      - 'lenr_constants.py'

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. Lint & Style
  # ──────────────────────────────────────────
  lint:
    name: "Lint & Style"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Ruff check (errors only)
        run: ruff check python/ lenr_constants.py --select=E9,F63,F7,F82 --output-format=github

      - name: Ruff check (warnings)
        run: ruff check python/ lenr_constants.py --output-format=github --exit-zero

  # ──────────────────────────────────────────
  # 2. Import & Smoke Tests
  # ──────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('python/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests
        run: |
          cd python
          python -m pytest tests/ -v --timeout=120 --tb=short -q
        env:
          PYTHONPATH: ${{ github.workspace }}/python:${{ github.workspace }}

      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: python/tests/
          retention-days: 7

  # ──────────────────────────────────────────
  # 3. Module Import Verification
  # ──────────────────────────────────────────
  imports:
    name: "Verify All Imports"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Verify all module imports
        run: |
          cd python
          python -c "
          import sys
          sys.path.insert(0, '..')

          modules = [
              'physics_engine',
              'cherepanov_engine',
              'data_generator',
              'data_generator_v2',
              'lenr_comprehensive_data',
              'exfor_loader',
              'barrier_falsification',
              'alloy_predictor',
              'numba_kernels',
              'models.xgboost_classifier',
              'models.dnn_regressor',
              'models.anomaly_detector',
          ]

          failed = []
          for mod in modules:
              try:
                  __import__(mod)
                  print(f'  OK  {mod}')
              except Exception as e:
                  print(f'  FAIL  {mod}: {e}')
                  failed.append(mod)

          if failed:
              print(f'\n{len(failed)} modules failed to import!')
              sys.exit(1)
          else:
              print(f'\nAll {len(modules)} modules imported successfully')
          "

  # ──────────────────────────────────────────
  # 4. Data Generation Smoke Test
  # ──────────────────────────────────────────
  smoke:
    name: "Smoke Test: Data Pipeline"
    runs-on: ubuntu-latest
    needs: [test, imports]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Smoke test data generation
        run: |
          cd python
          python -c "
          import sys
          sys.path.insert(0, '..')

          # 1. Physics engine
          from physics_engine import PhysicsEngine
          pe = PhysicsEngine()
          for mode in ['maxwell', 'coulomb_original', 'cherepanov']:
              r = pe.calculate_barrier('Pd', 300, 0.9, mode=mode)
              print(f'{mode:20s} barrier={r.barrier_keV:.1f} keV')

          # 2. Data generator V2 (small batch)
          from data_generator_v2 import LENRDataGeneratorV2
          gen = LENRDataGeneratorV2()
          df = gen.generate_combined(n_synthetic=50, use_v3_features=True)
          print(f'V3 dataset: {df.shape[0]} rows, {df.shape[1]} cols')
          assert df.shape[0] >= 50, f'Too few rows: {df.shape[0]}'
          assert df.shape[1] >= 72, f'Too few cols: {df.shape[1]}'

          # 3. Alloy predictor
          from alloy_predictor import AlloyPredictor
          ap = AlloyPredictor()
          pred = ap.predict_lenr_potential({'Pd': 0.5, 'Ni': 0.5}, defect_concentration=0.1)
          print(f'Pd50-Ni50 LENR score: {pred.lenr_score:.1f}')
          assert 0 < pred.lenr_score < 100

          # 4. Cherepanov engine
          from cherepanov_engine import CherepanovEngine
          ce = CherepanovEngine()
          cr = ce.calculate('Pd', 2.5, 340, 0.9, 0.0, 0.5)
          print(f'Cherepanov result: resistance={cr.medium_resistance:.4f}')

          print('\\nAll smoke tests passed!')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}/python:${{ github.workspace }}
